# 并入 server { ... }，用于 /api/v1/video/* 等大体积上传 + 长耗时转码（避免 408 / 504）
# 若已有 location / 反代到 Next，可用更精确的 location 覆盖下列路径。
#
# 注意：nginx 默认 client_max_body_size 仅 1m；若误设为 10m，大于约 10MB 的 Opus/MP4
# 会被静默截断，Node 只收到首段，转码结果常固定为十几分钟，与「链式 Opus」症状类似。
#
# 工作台对大文件会使用分片接口（/api/v1/video/extract/chunk*），单片约 4MiB，仍建议保留
# 本段较大的 client_max_body_size 与超时，以便 JSON 会话与合并请求正常。
# 若启用对象存储直传（/presign、/from-storage），浏览器 PUT 发往桶域名，不经过本 location；
# 但 upload-options / presign / from-storage 仍走此处，可与 extract 共用本段。

location /api/v1/video/ {
    client_max_body_size 240m;
    # 慢网上传大 Opus/MP4 时，默认 60s 常会 408
    client_body_timeout 600s;
    send_timeout 600s;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # 收完 body 后，Node 侧 ffmpeg 可能仍要跑很久
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    # 大文件时减轻 nginx 磁盘缓冲（按需开启）
    # proxy_request_buffering off;
}
