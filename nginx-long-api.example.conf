# 并入 server { ... }，用于 /api/v1/video/* 等大体积上传 + 长耗时转码（避免 408 / 504）
# 若已有 location / 反代到 Next，可用更精确的 location 覆盖下列路径。

location /api/v1/video/ {
    client_max_body_size 240m;
    # 慢网上传大 Opus/MP4 时，默认 60s 常会 408
    client_body_timeout 600s;
    send_timeout 600s;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # 收完 body 后，Node 侧 ffmpeg 可能仍要跑很久
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    # 大文件时减轻 nginx 磁盘缓冲（按需开启）
    # proxy_request_buffering off;
}
