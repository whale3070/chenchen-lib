# 仅在「公网访问 next dev（npm run dev）」且前面有 Nginx/Caddy 反代时需要。
# 生产环境请使用：npm run build && npm run start（无 HMR，无 /_next/webpack-hmr，无此问题）。
#
# 将下列 location 并入 server { ... }，且 proxy_pass 指向实际 Node 监听地址。

location /_next/webpack-hmr {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
}

# 若整站反代 Next，建议整段 / 使用 WebSocket 友好配置；至少保证上述路径可 Upgrade。
